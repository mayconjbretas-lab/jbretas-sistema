<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBRETAS — Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/css/base.css?v=202607221525">
<link rel="icon" type="image/png" sizes="48x48" href="/shared/jbretas-favicon-48.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/shared/icon-192.png">
<meta name="theme-color" content="#0a0d1c">
<link rel="icon" type="image/png" sizes="32x32" href="/shared/jbretas-favicon-32.png">
</head>
<body>

<div id="screen-login">
  <div class="login-card">
    <div class="brand">
      <img src="/shared/jbretas-logo.png" alt="JBretas" style="height:72px;display:block;margin:0 auto 1rem">
      <div class="brand-name">JBRETAS</div>
      <div class="brand-sub">// Sistema Integrado</div>
    </div>

    <div class="field-group">
      <label class="field-label">E-mail</label>
      <input class="field-input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>

    <div class="field-group">
      <label class="field-label">Senha</label>
      <div class="senha-wrap">
        <input class="field-input" type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password">
        <button class="btn-olho" type="button" onclick="toggleSenha()" title="Mostrar/ocultar senha">👁</button>
      </div>
    </div>

    <div class="remember-row">
      <input class="remember-checkbox" type="checkbox" id="lembrar-check">
      <label class="remember-label" for="lembrar-check">LEMBRAR DE MIM</label>
    </div>

    <button class="btn-primary" id="btn-entrar" onclick="fazerLogin()">ENTRAR</button>
    <button class="forgot-link" onclick="abrirModalSenha()">Esqueci minha senha</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== MODAL ESQUECI MINHA SENHA ===== -->
<div class="modal-overlay" id="modal-senha">
  <div class="modal-card">
    <div class="modal-title">🔑 Recuperar Senha</div>
    <div class="modal-sub">
      Digite o e-mail cadastrado no sistema. Se encontrado, um administrador
      será notificado para te ajudar a redefinir o acesso.
    </div>
    <div class="field-group">
      <label class="field-label">E-mail cadastrado</label>
      <input class="field-input" type="email" id="recuperar-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <button class="btn-modal-send" id="btn-recuperar" onclick="enviarSolicitacaoSenha()">📧 SOLICITAR RECUPERAÇÃO</button>
    <button class="btn-modal-cancel" onclick="fecharModalSenha()">CANCELAR</button>
    <div class="modal-msg" id="modal-msg"></div>
  </div>
</div>

<script src="shared/js/config.js?v=202607221525"></script>
<script src="shared/js/api.js?v=202607221525"></script>
<script src="shared/js/auth.js?v=202607221525"></script>
<script>
  // Login automático (Cenário A): só entra direto se houver refresh_token
  // salvo (localStorage = "lembrar de mim"). Se o access estiver vencido,
  // renova antes de redirecionar. Sem refresh, mostra o login normal.
  (async function redirecionarSeJaLogado() {
    if (window.location.search.includes('expirado')) return;
    const refresh = localStorage.getItem('jbretas_refresh');
    if (!refresh) return;
    const token  = getTokenAtual();
    const expira = parseInt(localStorage.getItem('jbretas_expira') || '0', 10);
    const agora  = Math.floor(Date.now() / 1000);
    if (!token || !expira || expira <= agora + 30) {
      const ok = await jbretasRefresh();
      if (!ok) return; // refresh falhou → login normal
    }
    const usuario = getUsuarioLogado();
    if (usuario) redirecionarPorPerfil(usuario);
  })();

  // Pré-preenche e-mail se "lembrar de mim" foi usado antes
  (function restaurarEmailLembrado() {
    const emailSalvo = localStorage.getItem('jbretas_email_lembrado');
    if (emailSalvo) {
      document.getElementById('login-email').value = emailSalvo;
      document.getElementById('lembrar-check').checked = true;
    }
  })();

  if (window.location.search.includes('expirado')) {
    const erroEl = document.getElementById('login-error');
    erroEl.textContent = 'Sua sessão expirou. Faça login novamente.';
    erroEl.style.display = 'block';
  }

  function toggleSenha() {
    const input = document.getElementById('login-senha');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  async function fazerLogin() {
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const lembrar = document.getElementById('lembrar-check').checked;
    const erroEl = document.getElementById('login-error');
    const btn = document.getElementById('btn-entrar');

    erroEl.style.display = 'none';
    if (!email || !senha) {
      erroEl.textContent = 'Preencha e-mail e senha.';
      erroEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ENTRANDO...';

    try {
      const resp = await jbretasLogin(email, senha, lembrar);

      // "Lembrar de mim" guarda só o e-mail (nunca a senha) pra pré-preencher
      if (lembrar) {
        localStorage.setItem('jbretas_email_lembrado', email);
      } else {
        localStorage.removeItem('jbretas_email_lembrado');
      }

      redirecionarPorPerfil(resp.usuario);
    } catch (err) {
      erroEl.textContent = err.message || 'E-mail ou senha incorretos.';
      erroEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ENTRAR';
    }
  }

  document.getElementById('login-senha').addEventListener('keydown', e => {
    if (e.key === 'Enter') fazerLogin();
  });

  // ===== Modal recuperar senha =====
  function abrirModalSenha() {
    document.getElementById('modal-senha').classList.add('active');
    document.getElementById('recuperar-email').value = document.getElementById('login-email').value;
    document.getElementById('modal-msg').style.display = 'none';
  }

  function fecharModalSenha() {
    document.getElementById('modal-senha').classList.remove('active');
  }

  async function enviarSolicitacaoSenha() {
    const email = document.getElementById('recuperar-email').value.trim();
    const msgEl = document.getElementById('modal-msg');
    const btn = document.getElementById('btn-recuperar');

    if (!email) {
      msgEl.textContent = '⚠ Informe um e-mail válido.';
      msgEl.className = 'modal-msg err';
      msgEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ ENVIANDO...';

    try {
      // TODO: criar rota POST /auth/recuperar-senha no server.js
      // Por enquanto, registra a intenção e orienta a falar com o ADM.
      await apiFetch('/auth/recuperar-senha', {
        method: 'POST',
        body: JSON.stringify({ email }),
      }).catch(() => null); // não trava o fluxo se a rota ainda não existir

      msgEl.textContent = '✅ Solicitação registrada. Um administrador vai entrar em contato para redefinir sua senha.';
      msgEl.className = 'modal-msg ok';
      msgEl.style.display = 'block';
      btn.textContent = '📧 SOLICITAR RECUPERAÇÃO';
      btn.disabled = false;
    } catch (err) {
      msgEl.textContent = '❌ Erro ao enviar solicitação. Tente novamente.';
      msgEl.className = 'modal-msg err';
      msgEl.style.display = 'block';
      btn.textContent = '📧 SOLICITAR RECUPERAÇÃO';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
