<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>JBRETAS — Coleta de Revisão (Admin)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Mesmo ambiente de CSS do admin: admin.css (= jbretas2.css do AppPainel,
     define os tokens --sf/--ac/--tx*). NÃO carregar base.css aqui — misturar
     tokens quebraria o layout (mesma nota do admin/index.html). -->
<link rel="stylesheet" href="../admin.css">
<link rel="stylesheet" href="coleta-revisao.css">
<script>
  (function(){
    var t = localStorage.getItem('jb_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
</head>
<body>

<!-- Container onde a tela é renderizada. Na Etapa 4 isso vira a aba
     Ranking→Coleta do admin/index.html; aqui é página standalone de QA. -->
<div id="cr-root"></div>

<script src="../../../shared/js/config.js"></script>
<script src="../../../shared/js/api.js"></script>
<script src="../../../shared/js/auth.js"></script>
<script src="../../../shared/js/postos-mapa.js"></script>
<script src="../../../shared/js/coletas-service.js"></script>
<script src="coleta-revisao.js"></script>
<script>
  // Exige sessão ADM (redireciona pro login se não houver). Depois de
  // logado como ADM no localhost, esta página renderiza com dados reais.
  const usuario = exigirSessao(['ADM']);
  if (usuario) renderColetaRevisao(document.getElementById('cr-root'));
</script>
</body>
</html>
