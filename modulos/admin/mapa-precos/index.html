<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JBRETAS — Mapa de Postos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="48x48" href="/shared/jbretas-favicon-48.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/shared/icon-192.png">
<meta name="theme-color" content="#0a0d1c">
<link rel="icon" type="image/png" sizes="32x32" href="/shared/jbretas-favicon-32.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="../../../shared/css/base.css?v=202607221525">
<link rel="stylesheet" href="mapa-precos.css?v=202607221525">
</head>
<body>

<div id="screen-app">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.5rem">
      <img src="/shared/jbretas-logo.png" alt="JBretas" style="height:34px;display:block">
      <div>
        <div class="topbar-brand">JBRETAS</div>
        <div style="font-size:.62rem;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;font-family:var(--mono);margin-top:2px">// Sistema Integrado</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar" id="app-avatar">--</div>
        <div class="topbar-info">
          <div class="topbar-name" id="app-gerente">—</div>
          <div class="topbar-posto">ADM</div>
        </div>
      </div>
      <button class="btn-logout" onclick="jbretasLogout()">SAIR</button>
    </div>
  </div>

  <div class="app-main">

    <div class="page-header">
      <div>
        <div class="page-title">🗺️ Mapa de Postos</div>
        <div class="page-date">Visão geral da rede — 37 postos</div>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="map-ctrl" id="map-filtros">
      <button class="map-ftag on" data-sup="todos"    onclick="mapaSetSup(this,'todos')">Todos</button>
      <button class="map-ftag"    data-sup="Mauricio"  onclick="mapaSetSup(this,'Mauricio')">Mauricio</button>
      <button class="map-ftag"    data-sup="Paulo"     onclick="mapaSetSup(this,'Paulo')">Paulo</button>
      <button class="map-ftag"    data-sup="Fabricio"  onclick="mapaSetSup(this,'Fabricio')">Fabricio</button>
      <button class="map-ftag"    data-sup="Gledson"   onclick="mapaSetSup(this,'Gledson')">Gledson</button>
      <button class="map-ftag"    data-sup="Rodrigo"   onclick="mapaSetSup(this,'Rodrigo')">Rodrigo</button>
      <span id="mapa-contador" class="mapa-contador"></span>
    </div>

    <!-- MAPA -->
    <div class="map-wrap"><div id="leaflet-map"></div></div>

    <!-- DETALHE DO POSTO SELECIONADO -->
    <div id="mapa-detail"></div>

    <div class="aviso-integracao">
      ℹ️ Toque num posto pra ver os preços coletados hoje. A comparação com o
      nosso preço e as fotos lado a lado entram na próxima etapa (upgrade da
      tela de Coleta de Preços do painel admin).
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="../../../shared/js/postos-mapa.js?v=202607221525"></script>
<script src="../../../shared/js/config.js?v=202607221525"></script>
<script src="../../../shared/js/api.js?v=202607221525"></script>
<script src="../../../shared/js/auth.js?v=202607221525"></script>
<script src="../../../shared/js/coletas-service.js?v=202607221525"></script>
<script src="app.js?v=202607221525"></script>
</body>
</html>
