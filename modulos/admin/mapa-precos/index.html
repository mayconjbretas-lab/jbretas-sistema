<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBRETAS — Mapa de Postos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="stylesheet" href="../../../shared/css/base.css">
<link rel="stylesheet" href="mapa-precos.css">
</head>
<body>

<div id="screen-app">

  <div class="topbar">
    <div class="topbar-brand">JBRETAS</div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar" id="app-avatar">--</div>
        <div class="topbar-info">
          <div class="topbar-name" id="app-gerente">—</div>
          <div class="topbar-posto">ADM</div>
        </div>
      </div>
      <button class="btn-logout" onclick="jbretasLogout()">SAIR</button>
    </div>
  </div>

  <div class="app-main">

    <div class="page-header">
      <div>
        <div class="page-title">🗺️ Mapa de Postos</div>
        <div class="page-date">Visão geral da rede — 37 postos</div>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="map-ctrl" id="map-filtros">
      <button class="map-ftag on" data-sup="todos"    onclick="mapaSetSup(this,'todos')">Todos</button>
      <button class="map-ftag"    data-sup="Mauricio"  onclick="mapaSetSup(this,'Mauricio')">Mauricio</button>
      <button class="map-ftag"    data-sup="Paulo"     onclick="mapaSetSup(this,'Paulo')">Paulo</button>
      <button class="map-ftag"    data-sup="Fabricio"  onclick="mapaSetSup(this,'Fabricio')">Fabricio</button>
      <button class="map-ftag"    data-sup="Gledson"   onclick="mapaSetSup(this,'Gledson')">Gledson</button>
      <button class="map-ftag"    data-sup="Rodrigo"   onclick="mapaSetSup(this,'Rodrigo')">Rodrigo</button>
      <span id="mapa-contador" class="mapa-contador"></span>
    </div>

    <!-- MAPA -->
    <div class="map-wrap"><div id="leaflet-map"></div></div>

    <!-- DETALHE DO POSTO SELECIONADO -->
    <div id="mapa-detail"></div>

    <div class="aviso-integracao">
      ℹ️ Coordenadas e supervisores confirmados. A integração com os preços coletados
      (comparação com concorrentes) entra na próxima etapa, assim que o schema das
      tabelas <code>coletas</code>/<code>concorrentes</code> no Supabase for confirmado.
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="../../../shared/js/postos-mapa.js"></script>
<script src="../../../shared/js/config.js"></script>
<script src="../../../shared/js/api.js"></script>
<script src="../../../shared/js/auth.js"></script>
<script src="app.js"></script>
</body>
</html>
