<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JBRETAS — Coleta de Preços (Admin)</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="48x48" href="/shared/jbretas-favicon-48.png">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/shared/icon-192.png">
<meta name="theme-color" content="#0a0d1c">
<link rel="icon" type="image/png" sizes="32x32" href="/shared/jbretas-favicon-32.png">
<link rel="stylesheet" href="../../../shared/css/base.css?v=202607221525">
<link rel="stylesheet" href="coleta-precos.css?v=202607221525">
</head>
<body>

<div id="screen-app">

  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.5rem">
      <img src="/shared/jbretas-logo.png" alt="JBretas" style="height:34px;display:block">
      <div>
        <div class="topbar-brand">JBRETAS</div>
        <div style="font-size:.62rem;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;font-family:var(--mono);margin-top:2px">// Sistema Integrado</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar" id="app-avatar">--</div>
        <div class="topbar-info">
          <div class="topbar-name" id="app-gerente">—</div>
          <div class="topbar-posto">ADM</div>
        </div>
      </div>
      <button class="btn-logout" onclick="jbretasLogout()">SAIR</button>
    </div>
  </div>

  <div class="app-main" style="max-width:1100px;">

    <div class="page-header">
      <div>
        <div class="page-title">💰 Coleta de Preços</div>
        <div class="page-date">Lançamentos de todos os postos — visão bruta</div>
      </div>
    </div>

    <div class="admin-filtros">
      <input type="text" class="field-input" id="filtro-posto" placeholder="Filtrar por posto próprio..." oninput="renderTabela()">
      <input type="text" class="field-input" id="filtro-concorrente" placeholder="Filtrar por concorrente..." oninput="renderTabela()">
      <select class="field-select" id="filtro-dias" onchange="carregarColetas()">
        <option value="7">Últimos 7 dias</option>
        <option value="15" selected>Últimos 15 dias</option>
        <option value="30">Últimos 30 dias</option>
        <option value="60">Últimos 60 dias</option>
      </select>
    </div>

    <div class="coleta-card">
      <div id="tabela-coletas">
        <div class="empty-state">Carregando...</div>
      </div>
    </div>

  </div>

</div>

<script src="../../../shared/js/config.js?v=202607221525"></script>
<script src="../../../shared/js/api.js?v=202607221525"></script>
<script src="../../../shared/js/auth.js?v=202607221525"></script>
<script src="app.js?v=202607221525"></script>
</body>
</html>
